version: "3.9"

services:
  # --- ICS Simulation Layer ---
  simulation:
    image: fortiphyd/grfics-simulation
    container_name: simulation
    hostname: simulation
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "55555"]
      interval: 5s
      retries: 5
    networks:
      a-grfics-admin: {}
      b-ics-net:
        ipv4_address: 192.168.95.10

  plc:
    image: fortiphyd/grfics-plc
    container_name: plc
    hostname: plc
    cap_add:
      - NET_ADMIN
    ports:
      - "8080:8080"
    volumes:
      - plc_volume:/docker_persistent
    networks:
      a-grfics-admin: {}
      b-ics-net:
        ipv4_address: 192.168.95.2

  ews:
    image: fortiphyd/grfics-workstation
    container_name: ews
    hostname: ews
    cap_add:
      - NET_ADMIN
    ports:
      - "6080:6080"
    volumes:
      # EXPORT: Send internal system logs (auth.log, syslog) to shared folder
      - ./shared_logs/ews/auth.log:/var/log/auth.log
    networks:
      a-grfics-admin: {}
      b-ics-net:
        ipv4_address: 192.168.95.5

  hmi:
    image: fortiphyd/grfics-scadalts
    container_name: hmi
    hostname: hmi
    dns:
      - 8.8.8.8
    cap_add:
      - NET_ADMIN
    ports:
      - "6081:8080"
    volumes:
      - scadalts_db:/var/lib/mysql
    networks:
      a-grfics-admin: {}
      c-dmz-net:
        ipv4_address: 192.168.90.107

  kali:
    image: fortiphyd/grfics-attacker
    container_name: kali
    hostname: kali
    cap_add:
      - NET_ADMIN
    ports:
      - "6088:6080"
    sysctls:
      net.ipv4.conf.default.arp_announce: 2
      net.ipv4.conf.all.arp_announce: 2
    networks:
      a-grfics-admin: {}
      c-dmz-net:
        ipv4_address: 192.168.90.6

  router:
    image: fortiphyd/grfics-router
    container_name: router
    hostname: router
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      FWUI_SECRET_KEY: "some-long-secret-you-generate"
    volumes:
      - router_config:/etc/firewall
      # EXPORT: Send Suricata logs to shared folder
      - ./shared_logs/router:/var/log/suricata
    healthcheck:
      test: ["CMD", "bash", "-c", "ip route | grep -q 192.168.95.0 || exit 1"]
      interval: 5s
      retries: 5
    networks:
      a-grfics-admin: {}
      b-ics-net:
        ipv4_address: 192.168.95.200
      c-dmz-net:
        ipv4_address: 192.168.90.200

  caldera:
    image: fortiphyd/grfics-caldera
    container_name: caldera
    hostname: caldera
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      a-grfics-admin: {}
      c-dmz-net:
        ipv4_address: 192.168.90.250

  # --- AI Data Collection Layer ---

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - a-grfics-admin
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config:/usr/share/logstash/config:ro
    ports:
      - "5044:5044"
      - "5000:5000"
    networks:
      - a-grfics-admin
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - a-grfics-admin
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # IMPORT: Read from the shared folder where all other services wrote their logs
      - ./shared_logs:/shared_logs:ro
      # IMPORT: Read Docker socket for container stdout
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./assets.json:/data/assets.json:ro
    depends_on:
      - logstash
    networks:
      - a-grfics-admin
    command: filebeat -e -strict.perms=false

networks:
  a-grfics-admin:
    driver: bridge
  b-ics-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.95.0/24
          gateway: 192.168.95.1
  c-dmz-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.90.0/24
          gateway: 192.168.90.1

volumes:
  scadalts_db:
  plc_volume:
  router_config:
  elasticsearch_data:
